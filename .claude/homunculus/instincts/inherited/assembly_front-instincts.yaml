# Assembly_front Workflow Update Network Connector Settings

## Action

Follow the update-network-connector-settings workflow:
1. Edit or add relevant network configuration in 'connectors/index.ts'.
2. Optionally update related composables (e.g., 'composables/useNetwork.ts') if network selection logic changes.
3. Optionally update environment examples (e.g., '.env.example') if new variables are needed.
4. Optionally add or update network icons (e.g., 'assets/icons/*.svg') for new networks.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: connectors/index.ts, composables/useNetwork.ts, .env.example

